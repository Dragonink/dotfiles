$LMB = mouse:272
$RMB = mouse:273
$MMB = mouse:274

$TERMINAL = ghostty +new-window
$APP_LAUNCHER = app2unit -- fuzzel


# Move focus
binddp = SUPER, Up, Move focus up, movefocus, u
binddp = SUPER, Down, Move focus down, movefocus, d
binddp = SUPER, Left, Move focus left, movefocus, l
binddp = SUPER, Right, Move focus right, movefocus, r
# Change active window in group
binddp = SUPER, W, Focus previous window in group, changegroupactive, b
binddp = SUPER, X, Focus next window in group, changegroupactive, f

# Close window
binddp = SUPER_SHIFT, Q, Close window, killactive
# Move window
binddmp = SUPER, $LMB, Move window, movewindow
binddp = SUPER_SHIFT, Up, Move window up, movewindow, u
binddp = SUPER_SHIFT, Down, Move window down, movewindow, d
binddp = SUPER_SHIFT, Left, Move window left, movewindow, l
binddp = SUPER_SHIFT, Right, Move window right, movewindow, r
# Resize window
binddmp = SUPER, $RMB, Resize window, resizewindow 2
binddmp = SUPER_SHIFT, $RMB, Resize window ignoring aspect ratio, resizewindow 1
binddp = SUPER, R, Resize window, submap, resize
submap = resize
	binddep = , Down, Decrease window height, resizeactive, 0 -1
	binddep = , Up, Increase window height, resizeactive, 0 1
	binddep = , Left, Decrease window width, resizeactive, -1 0
	binddep = , Right, Increase window width, resizeactive, 1 0
	binddp = , catchall, Finish resizing window, submap, reset
submap = reset
# Set window properties
binddp = SUPER, F, Toggle fullscreen, fullscreen
binddp = SUPER_SHIFT, F, Toggle floating, togglefloating
binddp = SUPER_SHIFT, P, Toggle pin, pin
# Group window
binddp = SUPER, G, Toggle group, togglegroup
binddp = SUPER_SHIFT, G, Move window in/out of group, submap, movegroupwindow
submap = movegroupwindow
	binddp = , Up, Move group window up, movewindoworgroup, u
	binddp = , Down, Move group window down, movewindoworgroup, d
	binddp = , Left, Move group window left, movewindoworgroup, l
	binddp = , Right, Move group window right, movewindoworgroup, r
	binddp = , Up, Finish moving group window, submap, reset
	binddp = , Down, Finish moving group window, submap, reset
	binddp = , Left, Finish moving group window, submap, reset
	binddp = , Right, Finish moving group window, submap, reset
	binddp = , catchall, Finish moving group window, submap, reset
submap = reset

# Master layout
binddp = SUPER, exclam, Focus master window, layoutmsg, focusmaster
binddp = SUPER_SHIFT, exclam, Swap active window with master, layoutmsg, swapwithmaster master

# Change workspace
binddp = ALT, Tab, Next workspace, workspace, m+1
binddp = SHIFT_ALT, Tab, Previous workspace, workspace, m-1
binddp = SUPER, code:10, Workspace 1, workspace, 1
binddp = SUPER, code:11, Workspace 2, workspace, 2
binddp = SUPER, code:12, Workspace 3, workspace, 3
binddp = SUPER, code:13, Workspace 4, workspace, 4
binddp = SUPER, code:14, Workspace 5, workspace, 5
binddp = SUPER, code:15, Workspace 6, workspace, 6
binddp = SUPER, code:16, Workspace 7, workspace, 7
binddp = SUPER, code:17, Workspace 8, workspace, 8
binddp = SUPER, code:18, Workspace 9, workspace, 9
# Move window to workspace
binddp = SUPER_SHIFT, code:10, Move window to workspace 1, movetoworkspacesilent, 1
binddp = SUPER_SHIFT, code:11, Move window to workspace 2, movetoworkspacesilent, 2
binddp = SUPER_SHIFT, code:12, Move window to workspace 3, movetoworkspacesilent, 3
binddp = SUPER_SHIFT, code:13, Move window to workspace 4, movetoworkspacesilent, 4
binddp = SUPER_SHIFT, code:14, Move window to workspace 5, movetoworkspacesilent, 5
binddp = SUPER_SHIFT, code:15, Move window to workspace 6, movetoworkspacesilent, 6
binddp = SUPER_SHIFT, code:16, Move window to workspace 7, movetoworkspacesilent, 7
binddp = SUPER_SHIFT, code:17, Move window to workspace 8, movetoworkspacesilent, 8
binddp = SUPER_SHIFT, code:18, Move window to workspace 9, movetoworkspacesilent, 9
# Move workspace to monitor
binddp = SUPER_CONTROL_SHIFT, Up, Move workspace to up monitor, movecurrentworkspacetomonitor, u
binddp = SUPER_CONTROL_SHIFT, Down, Move workspace to down monitor, movecurrentworkspacetomonitor, d
binddp = SUPER_CONTROL_SHIFT, Left, Move workspace to left monitor, movecurrentworkspacetomonitor, l
binddp = SUPER_CONTROL_SHIFT, Right, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# Launch applications
bindd = SUPER, Return, Open new terminal, exec, $TERMINAL
bindd = SUPER, Space, Open app launcher, exec, $APP_LAUNCHER
# Take screenshot
binddru = , Print, Take screenshot, exec, hyprshot --clipboard-only --mode active --mode output
binddru = SHIFT, Print, Take screenshot of window, exec, hyprshot --clipboard-only --mode active --mode window
binddu = CONTROL, Print, Take screenshot of region, exec, hyprshot --clipboard-only --mode region
binddru = CONTROL_ALT, Print, Take screenshot of frozen region, exec, hyprshot --clipboard-only --mode region --freeze
# Function keys
binddlepu = , XF86MonBrightnessDown, Decrease brightness, exec, brightnessctl --class backlight set 1%-
binddlepu = , XF86MonBrightnessUp, Increase brightness, exec, brightnessctl --class backlight set +1%
binddlepu = , XF86AudioLowerVolume, Decrease volume, exec, wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 1%-
binddlepu = , XF86AudioRaiseVolume, Increase volume, exec, wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 1%+
binddlpu = , XF86AudioMute, Toggle deaf, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binddlpu = , XF86AudioMicMute, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
binddlpu = , XF86AudioPlay, Play media, exec, playerctl play
binddlpu = , XF86AudioPause, Pause media, exec, playerctl pause
binddlpu = , XF86AudioStop, Stop media, exec, playerctl stop
binddlpu = , XF86AudioPrev, Previous media, exec, playerctl previous
binddlpu = , XF86AudioNext, Next media, exec, playerctl next
# Manage session
binddp = SUPER, L, Lock session, exec, loginctl lock-session
