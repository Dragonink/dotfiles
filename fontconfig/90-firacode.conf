<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<description>Configure Fira Code</description>

	<alias>
		<family>Fira Code</family>
		<prefer>
			<family>FiraCode Nerd Font</family>
		</prefer>
	</alias>

	<match target="font">
		<test name="family" compare="contains"><string>FiraCode</string></test>

		<edit name="fontfeatures" mode="append">
			<string>ss09 on</string>
		</edit>
	</match>
</fontconfig>
